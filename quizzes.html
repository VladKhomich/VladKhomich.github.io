---
layout: default
---

Quizzes for developers will be posted here. Some of them will be added just for fun, some will help to assess your knowledge.

<div class="posts">
  {% for post in site.quizzes %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Take Quiz</a>
    </article>
  {% endfor %}
</div>

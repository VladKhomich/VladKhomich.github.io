<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" /></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/">Blog</a>
            <a href="{{ site.baseurl }}/talks">Talks</a>
            <a href="{{ site.baseurl }}/quizzes">Dev Quizzes</a>
            <a href="{{ site.baseurl }}/about">About</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
          <p class="footer-note">This site stores a small marker in your browser to avoid counting repeat views on posts.</p>
        </footer>
      </div>
    </div>

    {% include analytics.html %}
    <script>window.COUNTER_API_URL = "{{ site.counter_api_url }}";</script>
    <script src="{{ site.baseurl }}/js/quiz.js"></script>
    <script src="{{ site.baseurl }}/js/view-counter.js"></script>
    <script src="{{ site.baseurl }}/js/quiz-counter.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('code.language-mermaid').forEach(function (el) {
          var div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = el.textContent;
          el.parentNode.replaceWith(div);
        });
        mermaid.initialize({ startOnLoad: true, theme: 'default' });
      });
    </script>
  </body>
</html>

---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {% if page.toc %}
      {% assign toc_levels = page.toc_levels | default: site.toc_levels %}
      {% include toc.html levels=toc_levels content=content %}
    {% endif %}
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
    <span id="view-counter" data-post-key="{{ page.post_key }}"></span>
  </div>

  {% include giscus.html %}
</article>
